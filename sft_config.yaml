# =============================================================================
# Codeforces trace SFT — 8× A100 80GB, ZeRO-3 (accelerate_zero3.yaml)
# See README.md / CLUSTER_RUNBOOK.md
# =============================================================================

# ── Model (downloaded from Hugging Face on first run) ────────────────────────
model_name_or_path: Qwen/Qwen2.5-Coder-7B-Instruct
eos_token: "<|im_end|>"

# ── Training data (place JSONL files in ./data/ — see data/README.txt) ───────
curriculum_data_path: data/train_curriculum.jsonl
shuffle_data_path: data/train.jsonl
eval_data_path: ""
eval_split_ratio: 0.05
curriculum_no_shuffle_epochs: 2

# ── Sequence ─────────────────────────────────────────────────────────────────
max_seq_length: 32768
packing: false
# Drop examples whose total char count exceeds this (~4 chars/token → 60k ≈ 15k tokens).
# Tightened from 90k: backward through lm_head needs [seq×vocab] gradient tensor,
# which is ~3.4 GB at 15k tokens vs ~6.9 GB at 30k. Keeps 99%+ of examples.
max_example_chars: 60000

# ── Optimisation ─────────────────────────────────────────────────────────────
learning_rate: 4.0e-05
num_train_epochs: 10
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
# Effective batch = num_gpus × per_device_train_batch_size × gradient_accumulation_steps
# 8 × 1 × 8 = 64 sequences per optimizer step

optimizer_type: adamw_torch_fused
adam_beta1: 0.9
adam_beta2: 0.95
adam_epsilon: 1.0e-08
weight_decay: 0.01
max_grad_norm: 1.0

lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1
warmup_ratio: 0.03

# ── Evaluation during training ───────────────────────────────────────────────
do_eval: true
eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: eval_loss

# ── LoRA ─────────────────────────────────────────────────────────────────────
# With LoRA, the frozen base IS the ref model → zero extra VRAM, KL is free.
# Optimizer states shrink from ~28 GB to ~135 MB/GPU. ZeRO-3 + 32k context now fits easily.
use_lora: true
lora_r: 64
lora_alpha: 128           # 2× rank
lora_dropout: 0.05
lora_target_modules: all-linear

# ── KL regularisation ────────────────────────────────────────────────────────
# Re-enabled: LoRA ref = frozen base via disable_adapter() — no second model load.
kl_beta: 0.1

# ── Efficiency ───────────────────────────────────────────────────────────────
gradient_checkpointing: true
bf16: true
use_liger_kernel: false

# ── Logging / checkpoints ───────────────────────────────────────────────────
seed: 42
output_dir: ./checkpoints
hub_model_id: null
logging_steps: 10
save_total_limit: 5    # keep only the 5 most recent checkpoints
report_to: tensorboard
